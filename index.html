<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 320px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
  font-size: 22px;
}

.input-box {
  position: relative;
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.toggle {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}

.divider {
  margin: 15px 0;
  display: flex;
  align-items: center;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  border-bottom: 1px solid #ccc;
}

.divider span {
  margin: 0 8px;
  font-size: 13px;
  color: #777;
}

.social-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 14px;
  cursor: pointer;
}

.google {
  background: #f5f5f5;
  color: black;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <div class="input-box">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <input type="password" id="senha" placeholder="Palavra-passe">
    <span class="toggle" onclick="mostrarSenha()">👁️</span>
  </div>

  <button onclick="login()">Login</button>

  <div class="divider">
    <span>Ou</span>
  </div>

  <button class="social-btn google" onclick="loginGoogle()">
    Continuar com Google
  </button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6tnv1httnE_JUDEPEs1Rd20N8xAOhm54",
  authDomain: "meu-app-ec557.firebaseapp.com",
  projectId: "meu-app-ec557",
  storageBucket: "meu-app-ec557.appspot.com",
  messagingSenderId: "647319948154",
  appId: "1:647319948154:web:de9864227e0ea471e8a4c3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// REDIRECIONAR AUTOMATICAMENTE
auth.onAuthStateChanged((user) => {
  if (user) {
    window.location.href = "https://livros-angolanos.vercel.app/";
  }
});

// RESULTADO DO REDIRECT (IMPORTANTE)
auth.getRedirectResult()
  .then((result) => {
    if (result.user) {
      window.location.href = "https://livros-angolanos.vercel.app/";
    }
  })
  .catch((error) => {
    alert("Erro ao entrar com Google!");
  });

// Mostrar senha
function mostrarSenha() {
  let senha = document.getElementById("senha");
  senha.type = senha.type === "password" ? "text" : "password";
}

// LOGIN EMAIL
function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    alert("Preencha todos os campos!");
    return;
  }

  auth.signInWithEmailAndPassword(email, senha)
    .then(() => {
      window.location.href = "https://livros-angolanos.vercel.app/";
    })
    .catch((e) => {

      if (e.code === "auth/user-not-found") {
        alert("Ainda não tens uma conta.\nUsa o Google para entrar rapidamente.");

      } else if (e.code === "auth/wrong-password") {
        alert("Palavra-passe incorreta!");

      } else if (e.code === "auth/invalid-email") {
        alert("Email inválido!");

      } else {
        alert("Erro ao entrar.");
      }

    });
}

// LOGIN GOOGLE (CORRIGIDO)
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}
</script>

</body>
</html>
